version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anime-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: anime_bridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anime-network

  redis:
    image: redis:7-alpine
    container_name: anime-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anime-network

  neo4j:
    image: neo4j:5.19-community
    container_name: anime-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anime-network

  rust-engine:
    build: services/rust-engine
    container_name: anime-rust-api
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379/
      JWT_SECRET: dev-phase5-secret-key-min-32-chars
      RUST_LOG: info
    ports:
      - "3000:3000"
    networks:
      - anime-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nestjs-bridge:
    build: services/nestjs-bridge
    container_name: anime-nestjs-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rust-engine:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: anime_bridge
      JWT_SECRET: nestjs-dev-secret-key-min-32-chars-long
      JWT_EXPIRATION: 3600
      RUST_API_URL: http://rust-engine:3000
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    networks:
      - anime-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  sveltekit-frontend:
    build: services/sveltekit-frontend
    container_name: anime-sveltekit-frontend
    depends_on:
      nestjs-bridge:
        condition: service_healthy
    environment:
      PUBLIC_API_URL: http://nestjs-bridge:3001
    ports:
      - "5173:5173"
    networks:
      - anime-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local

networks:
  anime-network:
    driver: bridge
