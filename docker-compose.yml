version: '3.8'

services:
  neo4j:
    image: neo4j:5.19-community
    container_name: anime-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - anime-network

  api:
    build: .
    container_name: anime-harvester-api
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      RUST_LOG: info
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - anime-network
    command: serve --host 0.0.0.0 --port 3000 --neo4j-uri neo4j://neo4j:7687

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  anime-network:
    driver: bridge
